name: Print Hello World
on:
  push:
jobs:
  print:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Repo Clone
        uses: actions/checkout@v4
      - name: Setup Node version
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install dependencies
        run: npm ci
      - name: run test
        run: npm run test